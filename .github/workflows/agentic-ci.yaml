name: Agentic IDP CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-heal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Pytest
        id: pytest_run
        run: |
          pytest tests/ > pytest_results.txt 2>&1 || echo "Pytest failed"
        continue-on-error: true

      - name: Trigger Agentic Healing (If Tests Failed)
        if: steps.pytest_run.outcome == 'failure'
        run: |
          echo "Test failures detected. Passing tracebacks to Agentic IDP for self-healing diagnosis..."
          # Mocking the call to the deployed service
          # curl -X POST https://idp.yourdomain.com/api/v1/analyze-failure -H 'Content-Type: application/json' -d @failure.json
          echo "Healing agent triggered successfully."
